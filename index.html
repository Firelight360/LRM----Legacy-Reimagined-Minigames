  <div class="corner-buttons">
  <div class="guibox small-box" id="music-toggle" title="Toggle Music">🎵</div>

  <audio id="music" loop>
  <source src="assets/music/By The Lake - Cheryltje (C418 Inspired Music).mp3" type="audio/mpeg">
</audio>
  
  <script>
  const musicToggle = document.getElementById("music-toggle");
  const bgToggle = document.getElementById("bg-toggle");
  const music = document.getElementById("music");
  const panorama = document.querySelector(".panorama");

  let musicOn = true;
  let bgState = 0; // 0 = first background, 1 = second

  // Music toggle
  musicToggle.addEventListener("click", () => {
    if (musicOn) {
      music.pause();
      musicOn = false;
      musicToggle.style.opacity = "0.5"; // visually indicate off
    } else {
      music.play();
      musicOn = true;
      musicToggle.style.opacity = "1";
    }
  });

  // Background toggle
  const backgrounds = [
    "assets/TU31_Panorama_Background_S.png",
    "assets/TU31_Panorama_Background_N.png"
  ];

  bgToggle.addEventListener("click", () => {
    bgState = (bgState + 1) % backgrounds.length;
    panorama.style.backgroundImage = `url('${backgrounds[bgState]}')`;
  });
  </script>
